              - 'heading "Convocatoria Extraordinaria: Programa de Investigación Multidisciplinar en Ciencia de Datos e Inteligencia Artificial 2026" [level=3] [ref=e360]'
          - generic [ref=e361]:
            - paragraph [ref=e362]: Se convoca a docentes y estudiantes de posgrado a participar del programa de investigación multidisciplinar financiado por CONCYTEC.
            - paragraph [ref=e363]: "La Dirección de Investigación de la Facultad de Ingeniería Estadística e Informática (FINESI) de la Universidad Nacional del Altiplano convoca a todos los docentes investigadores y estudiantes de posgrado a participar del Programa de Investigación Multidisciplinar en Ciencia de Datos e Inteligencia Artificial para el período 2026-2027. OBJETIVOS DEL PROGRAMA: 1. Fortalecer las capacidades de investigación en áreas de ciencia de datos, machine learning y deep learning aplicados a problemáticas regionales. 2. Promover la colaboración interdisciplinaria entre las escuelas profesionales de la facultad. 3. Generar publicaciones científicas indexadas en revistas de alto impacto (Scopus, Web of Science). 4. Desarrollar soluciones tecnológicas basadas en IA para los sectores productivos de la región Puno. LÍNEAS DE INVESTIGACIÓN PRIORITARIAS: - Procesamiento de lenguaje natural para lenguas originarias (Quechua, Aymara) - Visión por computadora aplicada a la agricultura de altura - Análisis predictivo para sistemas de salud en zonas rurales - Big Data y minería de datos para gestión de recursos hídricos del Lago Titicaca - Ciberseguridad y protección de datos en instituciones públicas REQUISITOS PARA POSTULAR: - Ser docente ordinario o contratado de la FINESI con dedicación a tiempo completo - Contar con grado de Maestro o Doctor (para investigadores principales) - Estudiantes de maestría o doctorado pueden participar como co-investigadores - Presentar un proyecto de investigación alineado a las líneas prioritarias - Compromiso de publicación de al menos un artículo científico indexado FINANCIAMIENTO: El programa cuenta con un fondo de S/. 500,000.00 (quinientos mil soles) distribuidos de la siguiente manera: - Proyectos tipo A (investigación básica): hasta S/. 80,000.00 - Proyectos tipo B (investigación aplicada): hasta S/. 120,000.00 - Proyectos tipo C (desarrollo tecnológico): hasta S/. 150,000.00 CRONOGRAMA: - Publicación de bases: 15 de abril de 2026 - Recepción de proyectos: 15 de abril al 30 de mayo de 2026 - Evaluación por pares: 1 al 30 de junio de 2026 - Publicación de resultados: 15 de julio de 2026 - Inicio de ejecución: 1 de agosto de 2026 DOCUMENTOS REQUERIDOS: 1. Formulario de postulación (Formato F-01) 2. Plan de investigación detallado 3. Presupuesto analítico 4. Curriculum vitae documentado del investigador principal 5. Carta de compromiso institucional 6. Declaración jurada de no tener investigaciones pendientes Para mayor información, comunicarse con la Dirección de Investigación al correo investigacion@finesi.edu.pe o al teléfono (051) 369-375 anexo 1234."
